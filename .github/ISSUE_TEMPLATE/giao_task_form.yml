name: "📋 Giao Task Tính Năng / Chỉ Tiêu (Dạng Form)"
description: "Form điền thông tin giao task chuẩn nghiệp vụ và technical"
title: "[FEATURE]: "
labels: ["feature"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📋 PHẦN 1: MÔ TẢ CHUNG
        *Vui lòng điền đầy đủ các thông tin nghiệp vụ dưới đây.*

  - type: textarea
    id: business_meaning
    attributes:
      label: "1. Business Meaning"
      description: "Người dùng hiểu chỉ tiêu này là gì?"
      placeholder: "Nhập giải thích về mặt nghiệp vụ cho người dùng..."
    validations:
      required: true

  - type: textarea
    id: ui_ux
    attributes:
      label: "2. UI/UX"
      description: "Dùng Claude để generate ra hoặc chèn link/hình ảnh thiết kế."
      placeholder: "Dán link Figma, hình ảnh hoặc code giao diện vào đây..."
    validations:
      required: false

  - type: textarea
    id: default_display
    attributes:
      label: "3. Mô tả hiển thị mặc định (Default)"
      description: "Sort theo thời gian, amount, trạng thái như thế nào?"
      placeholder: "Ví dụ: Sắp xếp theo thời gian tạo giảm dần..."
    validations:
      required: true

  - type: textarea
    id: filter_search
    attributes:
      label: "4. Bộ lọc & Tìm kiếm (Filter/Search)"
      description: "Mô tả rõ các điều kiện lọc, đặc biệt là logic AND - OR khi filter."
      placeholder: "Ví dụ: Lọc theo Chi nhánh AND Trạng thái..."
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        ---
        ## 📊 PHẦN 2: CHI TIẾT NHÓM THÔNG TIN (CỘT | CHỈ TIÊU DỮ LIỆU)

  - type: textarea
    id: technical_definition
    attributes:
      label: "5. Technical Definition"
      description: "Dev hiểu dữ liệu lấy từ đâu? (Tên bảng, Database, API nào...)"
      placeholder: "Ví dụ: Lấy từ bảng `orders`, field `total_amount`..."
    validations:
      required: true

  - type: textarea
    id: validation_rule
    attributes:
      label: "6. Validation & Formula"
      description: "Quy tắc kiểm tra dữ liệu đầu vào/đầu ra và Công thức tính toán (nếu có)."
      placeholder: "Ví dụ: Công thức = Doanh thu - Chi phí. Input mẫu..."
    validations:
      required: false

  - type: textarea
    id: missing_data_edge_cases
    attributes:
      label: "7. Missing Data & Edge Cases & Exceptions"
      description: "Nếu thiếu dữ liệu xử lý sao? Các trường hợp đặc biệt? Lỗi tính toán/hiển thị xử lý thế nào?"
      placeholder: "Ví dụ: Nếu null thì hiển thị 'N/A'. Lỗi hệ thống hiển thị ô trống..."
    validations:
      required: false

  - type: textarea
    id: time_scope
    attributes:
      label: "8. Time Scope"
      description: "Mô tả về phạm vi thời gian dữ liệu (Ngày, tháng, quý, năm...)"
      placeholder: "Ví dụ: Dữ liệu tính lũy kế từ đầu năm đến hiện tại..."
    validations:
      required: false

  - type: checkboxes
    id: dev_checklist
    attributes:
      label: "Checklist cho Developer"
      options:
        - label: "Đã hiểu rõ Business Logic"
          required: false
        - label: "Đã làm rõ Technical Definition (Database/API)"
          required: false
        - label: "Đã cover hết các Edge Cases"
          required: false
